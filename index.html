<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sagwel store</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<nav>
  <div class="nav-left">
    <button class="nav-link" onclick="toggleCart()" style="position:relative">
      cart<span class="nav-badge" id="cartBadge"></span>
    </button>
  </div>
  <div class="nav-logo" onclick="goHome()">sagwel store</div>
  <div class="nav-right">
    <button class="admin-btn" id="adminPanelBtn" onclick="openAdmin()">admin panel</button>
    <div class="user-wrap" id="userWrap">
      <button class="nav-link" id="authBtn" onclick="handleAuthBtn()">sign in</button>
      <div class="user-dd" id="userDd">
        <div class="user-dd-info">
          <div class="user-dd-name" id="ddName"></div>
          <div class="user-dd-email" id="ddEmail"></div>
        </div>
        <button class="user-dd-item" onclick="logout()">sign out</button>
      </div>
    </div>
  </div>
</nav>

<div class="page">
  <div class="catalog-header">
    <div class="cat-tabs">
      <button class="cat-tab active" id="catAll"         onclick="catClick('all','catAll')">all</button>
      <button class="cat-tab"        id="catTops"        onclick="catClick('tops','catTops')">top</button>
      <button class="cat-tab"        id="catBottoms"     onclick="catClick('bottoms','catBottoms')">bottom</button>
      <button class="cat-tab"        id="catAccessories" onclick="catClick('accessories','catAccessories')">accessories</button>
    </div>
  </div>
  <div class="catalog-body">
    <div class="results-info" id="resultsInfo"></div>
    <div class="product-grid"  id="productGrid"></div>
  </div>
  <footer>
    <div class="footer-links">
      <button class="footer-link" onclick="openInfo('about')">about</button>
      <button class="footer-link" onclick="openInfo('policy')">privacy policy</button>
    </div>
    <div class="footer-bottom">© 2026 sagwel store. all rights reserved.</div>
  </footer>
</div>

<!-- PRODUCT MODAL -->
<div class="pm-overlay" id="pmOverlay" onclick="closePmBg(event)">
  <div class="pm-modal">
    <button class="pm-close" onclick="closePm()">✕</button>
    <div class="pm-left"><img id="pmImg" src="" alt=""/></div>
    <div class="pm-right">
      <div class="pm-name"  id="pmName"></div>
      <div class="pm-price" id="pmPrice"></div>
      <div class="pm-desc"  id="pmDesc"></div>
      <div><div class="pm-sec">size</div><div class="pm-sizes" id="pmSizes"></div></div>
      <div class="pm-actions" id="pmActions">
        <button class="pm-add" onclick="addFromModal()">add to cart</button>
      </div>
    </div>
  </div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCartBg(event)">
  <div class="cart-modal">
    <div class="cart-head">
      <h3>cart <span id="cartCount" style="color:var(--text3);font-weight:400;font-size:12px"></span></h3>
      <button class="c-close" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-body" id="cartBody"></div>
    <div class="cart-foot" id="cartFoot" style="display:none">
      <div class="cart-row"><span>items</span><span id="cartSubtotal" class="no-lower">0 ₽</span></div>
      <div class="cart-row"><span>delivery</span><span class="no-lower">500 ₽</span></div>
      <div class="cart-row total"><span>total</span><span id="cartTotal" class="no-lower">0 ₽</span></div>
      <button class="checkout-btn" onclick="checkout()">checkout</button>
    </div>
  </div>
</div>

<!-- AUTH -->
<div class="modal-overlay" id="authModal" onclick="closeAuthBg(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <div class="modal-logo">
      <div class="modal-logo-text">sagwel store</div>
      <div class="modal-subtitle">sign in to your account</div>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" id="loginTab"    onclick="switchTab('login')">sign in</button>
      <button class="modal-tab"        id="registerTab" onclick="switchTab('register')">register</button>
    </div>
    <div id="loginForm">
      <div class="form-group"><label class="form-label">email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div class="form-group"><label class="form-label">password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <button class="form-submit" onclick="login()">sign in</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="form-group"><label class="form-label">name</label>
        <input class="form-input" type="text" id="regName" placeholder="your name"/>
      </div>
      <div class="form-group"><label class="form-label">email</label>
        <input class="form-input" type="email" id="regEmail" placeholder="your@email.com"/>
      </div>
      <div class="form-group"><label class="form-label">password</label>
        <input class="form-input" type="password" id="regPassword" placeholder="min. 6 characters" onkeydown="if(event.key==='Enter')register()"/>
      </div>
      <button class="form-submit" onclick="register()">create account</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-overlay" id="adminOverlay" onclick="closeAdminBg(event)">
  <div class="admin-modal">
    <div class="admin-head">
      <div class="admin-head-row">
        <h3>admin panel</h3>
        <button class="c-close" onclick="closeAdmin()">✕</button>
      </div>
      <div class="admin-tabs-row">
        <button class="admin-tab active" id="aTab_products" onclick="adminSwitchTab('products')">products</button>
        <button class="admin-tab"        id="aTab_users"    onclick="adminSwitchTab('users')">users</button>
        <button class="admin-tab"        id="aTab_orders"   onclick="adminSwitchTab('orders')">orders</button>
      </div>
    </div>
    <div class="admin-body" id="adminBody"></div>
  </div>
</div>

<!-- INFO -->
<div class="info-overlay" id="infoOverlay" onclick="closeInfoBg(event)">
  <div class="info-modal">
    <button class="modal-close" onclick="closeInfo()">✕</button>
    <div class="info-title" id="infoTitle"></div>
    <div class="info-body"  id="infoBody"></div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>
<script src="script.js"></script>
</body>
</html>
